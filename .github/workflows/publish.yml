name: Publish to npm

on:
  push:
    branches: [main, master]

permissions:
  id-token: write  # Required for OIDC-based Trusted Publishing with npm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build --workspaces

      # Check each package — only publish if version differs from npm registry
      - name: Check @paulczar/sigen-modbus-mcp
        id: check_modbus
        run: |
          LOCAL=$(node -p "require('./packages/modbus-mcp/package.json').version")
          PUBLISHED=$(npm view @paulczar/sigen-modbus-mcp@latest version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Local $LOCAL differs from npm $PUBLISHED — will publish"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Local $LOCAL matches npm $PUBLISHED — skipping"
          fi

      - name: Check @paulczar/sigen-api-mcp
        id: check_api
        run: |
          LOCAL=$(node -p "require('./packages/api-mcp/package.json').version")
          PUBLISHED=$(npm view @paulczar/sigen-api-mcp@latest version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Local $LOCAL differs from npm $PUBLISHED — will publish"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Local $LOCAL matches npm $PUBLISHED — skipping"
          fi

      - name: Check @paulczar/sigen-docs-mcp
        id: check_docs
        run: |
          LOCAL=$(node -p "require('./packages/sigen-docs-mcp/package.json').version")
          PUBLISHED=$(npm view @paulczar/sigen-docs-mcp@latest version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Local $LOCAL differs from npm $PUBLISHED — will publish"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Local $LOCAL matches npm $PUBLISHED — skipping"
          fi

      - name: Publish @paulczar/sigen-modbus-mcp
        if: steps.check_modbus.outputs.changed == 'true'
        run: npm publish -w packages/modbus-mcp --access public --provenance

      - name: Publish @paulczar/sigen-api-mcp
        if: steps.check_api.outputs.changed == 'true'
        run: npm publish -w packages/api-mcp --access public --provenance

      - name: Publish @paulczar/sigen-docs-mcp
        if: steps.check_docs.outputs.changed == 'true'
        run: npm publish -w packages/sigen-docs-mcp --access public --provenance
