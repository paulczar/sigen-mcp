name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for OIDC-based Trusted Publishing with npm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build --workspaces

      - name: Publish @paulczar/sigen-modbus-mcp
        run: npm publish -w packages/modbus-mcp --access public --provenance

      - name: Publish @paulczar/sigen-api-mcp
        run: npm publish -w packages/api-mcp --access public --provenance

      - name: Publish @paulczar/sigen-docs-mcp
        run: npm publish -w packages/sigen-docs-mcp --access public --provenance
